trigger:
  - main

variables:
  acrName: 'sandeepreddam01'

stages:
- stage: Build
  displayName: 'Build and Push Images to ACR'
  jobs:
    - job: BuildAndPush
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: Docker@2
          displayName: 'Build and push web image'
          inputs:
            containerRegistry: 'acr-service-connection'
            repository: 'web-image'
            command: 'buildAndPush'
            Dockerfile: 'web/Dockerfile'
            buildContext: 'web'
            tags: |
              $(Build.BuildId)
              latest

        - task: Docker@2
          displayName: 'Build and push db image'
          inputs:
            containerRegistry: 'acr-service-connection'
            repository: 'db-image'
            command: 'buildAndPush'
            Dockerfile: 'db/Dockerfile'
            buildContext: 'db'
            tags: |
              $(Build.BuildId)
              latest

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  jobs:
    - job: DeployToAKS
      pool:
        vmImage: 'ubuntu-latest'
      steps:
        - task: AzureCLI@2
          displayName: 'Get AKS credentials'
          inputs:
            azureSubscription: 'azure-service-connection'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              az aks get-credentials \
                --resource-group rg-twotier-app \
                --name aks-twotier-cluster \
                --overwrite-existing

        - task: AzureCLI@2
          displayName: 'Create or update DB secret'
          inputs:
            azureSubscription: 'azure-service-connection'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              kubectl create secret generic db-secret \
                --from-literal=DB_PASSWORD=$DB_PASSWORD \
                --dry-run=client -o yaml | kubectl apply -f -
          env:
            DB_PASSWORD: $(dbPassword)

        - task: AzureCLI@2
          displayName: 'Apply Kubernetes manifests'
          inputs:
            azureSubscription: 'azure-service-connection'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              kubectl apply -f k8s/db-deployment.yaml
              kubectl apply -f k8s/db-service.yaml
              kubectl apply -f k8s/web-deployment.yaml
              kubectl apply -f k8s/web-service.yaml
